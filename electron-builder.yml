# ORPHIC — packaging (electron-builder)
appId: com.orphic.visualizer
productName: ORPHIC
directories:
  output: release
files:
  - out/**
  - index.html
  - css/**
  - js/**
asar: true

# Without a Developer ID, ad-hoc re-sign after the fuse patch — otherwise the
# kernel kills the app at launch on Apple Silicon (see build/adhoc-sign.cjs).
afterSign: build/adhoc-sign.cjs

# Harden the packaged binary (https://www.electronjs.org/docs/latest/tutorial/fuses)
electronFuses:
  runAsNode: false
  # Keep cookie encryption OFF: it stores a key in the macOS keychain ("ORPHIC
  # Safe Storage"), and with an ad-hoc signature every rebuild looks like a
  # different app — so macOS demands the keychain password on every launch.
  # ORPHIC keeps no cookies/credentials, so there is nothing to encrypt.
  enableCookieEncryption: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  grantFileProtocolExtraPrivileges: false

mac:
  category: public.app-category.music
  darkModeSupport: true
  # System-audio loopback needs CoreAudio process taps (macOS 14.2+) — the
  # Finder refuses to launch the app on anything older with a clear message.
  minimumSystemVersion: '14.2'
  target:
    - dmg
    - zip
  extendInfo:
    # Without this key macOS delivers a permanently-silent loopback stream
    # instead of an error (electron/electron#49607).
    NSAudioCaptureUsageDescription: >-
      ORPHIC visualizes the audio playing on this Mac. macOS asks once for
      permission to record system audio.
    NSMicrophoneUsageDescription: >-
      ORPHIC can visualize live sound from your microphone.

win:
  target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux is intentionally not packaged right now (untested). The runtime code
# paths (PulseAudio/PipeWire loopback, MPRIS transport) are kept working —
# re-add an AppImage target here when Linux support becomes official.
