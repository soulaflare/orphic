<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>html,body{margin:0;background:transparent}</style></head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const x = c.getContext('2d');
const S = 1024, CX = S / 2, CY = S / 2;

// ---- rounded-square tile (Big Sur-ish proportions), deep space black ----
const M = 64, R = 200, W = S - M * 2;
function tile(p) {
  p.beginPath();
  p.moveTo(M + R, M);
  p.arcTo(S - M, M, S - M, S - M, R);
  p.arcTo(S - M, S - M, M, S - M, R);
  p.arcTo(M, S - M, M, M, R);
  p.arcTo(M, M, S - M, M, R);
  p.closePath();
}
tile(x);
x.save();
x.clip();

// base: near-black with the app's #030208 depth
x.fillStyle = '#030208';
x.fillRect(0, 0, S, S);

// faint nebula breath — violet low, cyan high, barely there (negative space rules)
let g = x.createRadialGradient(CX, CY - 90, 0, CX, CY - 90, 560);
g.addColorStop(0, 'rgba(80, 60, 160, 0.20)');
g.addColorStop(0.5, 'rgba(40, 40, 110, 0.10)');
g.addColorStop(1, 'rgba(3, 2, 8, 0)');
x.fillStyle = g;
x.fillRect(0, 0, S, S);

// ---- circular waveform ring: the spectrum wrapped into an orbit ----
// deterministic layered sines = an organic "frozen moment of music"
function wob(a) {
  return Math.sin(a * 3 + 0.7) * 5
       + Math.sin(a * 7 + 2.1) * 4
       + Math.sin(a * 13 + 4.4) * 3.2
       + Math.sin(a * 23 + 1.3) * 2.4
       + Math.sin(a * 41 + 3.0) * 1.5;
}
function ringPath(base, amp) {
  x.beginPath();
  const N = 720;
  for (let i = 0; i <= N; i++) {
    const a = (i / N) * Math.PI * 2;
    const r = base + wob(a) * amp;
    const px = CX + Math.cos(a) * r, py = CY + Math.sin(a) * r;
    if (i === 0) x.moveTo(px, py); else x.lineTo(px, py);
  }
  x.closePath();
}
const ringGrad = x.createLinearGradient(CX - 300, CY + 300, CX + 300, CY - 300);
ringGrad.addColorStop(0, '#7b5cff');   // violet (bass end)
ringGrad.addColorStop(0.55, '#8be9fd'); // the app's cyan accent
ringGrad.addColorStop(1, '#d8f6ff');   // bright treble tip

// soft echo ring (the beat that just passed)
x.globalAlpha = 0.22;
x.strokeStyle = ringGrad;
x.lineWidth = 3;
x.shadowColor = 'rgba(123, 92, 255, 0.8)';
x.shadowBlur = 40;
ringPath(330, 1.8);
x.stroke();

// main ring — crisp, glowing
x.globalAlpha = 1;
x.lineWidth = 4.5;
x.shadowColor = 'rgba(139, 233, 253, 0.9)';
x.shadowBlur = 30;
ringPath(278, 1.0);
x.stroke();
ringPath(278, 1.0); // double-stroke for core brightness
x.shadowBlur = 8;
x.stroke();

// ---- the mote: ORPHIC's luminous cursor-being at the heart ----
x.shadowBlur = 0;
g = x.createRadialGradient(CX, CY, 0, CX, CY, 190);
g.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
g.addColorStop(0.08, 'rgba(214, 248, 255, 0.85)');
g.addColorStop(0.22, 'rgba(139, 233, 253, 0.40)');
g.addColorStop(0.5, 'rgba(110, 120, 255, 0.12)');
g.addColorStop(1, 'rgba(3, 2, 8, 0)');
x.fillStyle = g;
x.beginPath(); x.arc(CX, CY, 190, 0, Math.PI * 2); x.fill();

// hot core
g = x.createRadialGradient(CX, CY, 0, CX, CY, 30);
g.addColorStop(0, '#ffffff');
g.addColorStop(0.6, '#cfeffd');
g.addColorStop(1, 'rgba(139, 233, 253, 0)');
x.fillStyle = g;
x.beginPath(); x.arc(CX, CY, 30, 0, Math.PI * 2); x.fill();

// ---- a few drifting motes on / near the orbit (the flock listening) ----
const sparks = [
  [0.30, 272, 5.0, 0.9], [1.45, 286, 3.2, 0.7], [2.62, 260, 4.0, 0.8],
  [3.9, 280, 2.6, 0.6], [4.8, 252, 3.4, 0.75], [5.6, 296, 2.2, 0.55],
];
for (const [a, r, sz, al] of sparks) {
  const px = CX + Math.cos(a) * (r + wob(a)), py = CY + Math.sin(a) * (r + wob(a));
  g = x.createRadialGradient(px, py, 0, px, py, sz * 4);
  g.addColorStop(0, `rgba(220, 250, 255, ${al})`);
  g.addColorStop(0.4, `rgba(139, 233, 253, ${al * 0.5})`);
  g.addColorStop(1, 'rgba(139, 233, 253, 0)');
  x.fillStyle = g;
  x.beginPath(); x.arc(px, py, sz * 4, 0, Math.PI * 2); x.fill();
}

// subtle top-edge sheen so the tile reads as glass, not a void
g = x.createLinearGradient(0, M, 0, M + 340);
g.addColorStop(0, 'rgba(255, 255, 255, 0.06)');
g.addColorStop(1, 'rgba(255, 255, 255, 0)');
x.fillStyle = g;
x.fillRect(M, M, W, 340);

x.restore();

// hairline rim to separate the tile from light backgrounds
tile(x);
x.strokeStyle = 'rgba(139, 233, 253, 0.18)';
x.lineWidth = 2;
x.stroke();

document.title = 'done';
</script>
</body>
</html>
