<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>html,body{margin:0;background:transparent}</style></head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const x = c.getContext('2d');
const S = 1024, CX = S / 2, CY = S / 2;

// ---- rounded-square tile (Big Sur-ish proportions), deep space black ----
const M = 64, R = 200, W = S - M * 2;
function tile(p) {
  p.beginPath();
  p.moveTo(M + R, M);
  p.arcTo(S - M, M, S - M, S - M, R);
  p.arcTo(S - M, S - M, M, S - M, R);
  p.arcTo(M, S - M, M, M, R);
  p.arcTo(M, M, S - M, M, R);
  p.closePath();
}
tile(x);
x.save();
x.clip();

// base: near-black with the app's #030208 depth
x.fillStyle = '#030208';
x.fillRect(0, 0, S, S);

// faint nebula breath — violet low, cyan high, barely there (negative space rules)
let g = x.createRadialGradient(CX, CY - 90, 0, CX, CY - 90, 560);
g.addColorStop(0, 'rgba(80, 60, 160, 0.20)');
g.addColorStop(0.5, 'rgba(40, 40, 110, 0.10)');
g.addColorStop(1, 'rgba(3, 2, 8, 0)');
x.fillStyle = g;
x.fillRect(0, 0, S, S);

// ---- the highlighted cursor's rim: ORPHIC's clickable-bloom ring ----
// over anything clickable the cursor halo blooms into the spinning brand
// gradient (css: conic #8be9fd→#bd93f9→#ff79c6→#8be9fd). That hot ring is
// thick and spectral — it reads at every icon size, where the old hairline
// waveform vanished. A faint layered-sine wobble keeps the orbit organic.
function wob(a) {
  return Math.sin(a * 3 + 0.7) * 5
       + Math.sin(a * 7 + 2.1) * 4
       + Math.sin(a * 13 + 4.4) * 3.2
       + Math.sin(a * 23 + 1.3) * 2.4
       + Math.sin(a * 41 + 3.0) * 1.5;
}
function ringPath(base, amp) {
  x.beginPath();
  const N = 720;
  for (let i = 0; i <= N; i++) {
    const a = (i / N) * Math.PI * 2;
    const r = base + wob(a) * amp;
    const px = CX + Math.cos(a) * r, py = CY + Math.sin(a) * r;
    if (i === 0) x.moveTo(px, py); else x.lineTo(px, py);
  }
  x.closePath();
}
// the cursor's hot rim, started at top (−90°) so cyan crowns the ring
const RR = 300; // orbit radius
const conic = x.createConicGradient(-Math.PI / 2, CX, CY);
conic.addColorStop(0.00, '#8be9fd'); // cyan
conic.addColorStop(0.34, '#bd93f9'); // violet
conic.addColorStop(0.67, '#ff79c6'); // pink
conic.addColorStop(1.00, '#8be9fd'); // back to cyan — seamless spin

x.lineJoin = 'round';

// soft echo ring (the beat that just passed) — wider, dim
x.globalAlpha = 0.18;
x.strokeStyle = conic;
x.lineWidth = 96;
x.shadowColor = 'rgba(139, 233, 253, 0.6)';
x.shadowBlur = 70;
ringPath(RR + 30, 1.6);
x.stroke();

// main hot ring — thick, glowing, the highlighted cursor frozen mid-bloom
x.globalAlpha = 1;
x.lineWidth = 78;
x.shadowColor = 'rgba(139, 233, 253, 0.85)';
x.shadowBlur = 46;
ringPath(RR, 1.0);
x.stroke();
x.shadowBlur = 0;
ringPath(RR, 1.0); // crisp pass over the glow
x.stroke();

// bright inner highlight along the rim's inner lip — gives the ring a glassy
// rounded edge instead of a flat band
x.globalAlpha = 0.55;
x.strokeStyle = 'rgba(255, 255, 255, 0.9)';
x.lineWidth = 6;
ringPath(RR - 33, 1.0);
x.stroke();
x.globalAlpha = 1;

// ---- the mote: ORPHIC's luminous cursor-being at the heart ----
x.shadowBlur = 0;
g = x.createRadialGradient(CX, CY, 0, CX, CY, 190);
g.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
g.addColorStop(0.08, 'rgba(214, 248, 255, 0.85)');
g.addColorStop(0.22, 'rgba(139, 233, 253, 0.40)');
g.addColorStop(0.5, 'rgba(110, 120, 255, 0.12)');
g.addColorStop(1, 'rgba(3, 2, 8, 0)');
x.fillStyle = g;
x.beginPath(); x.arc(CX, CY, 190, 0, Math.PI * 2); x.fill();

// hot core
g = x.createRadialGradient(CX, CY, 0, CX, CY, 30);
g.addColorStop(0, '#ffffff');
g.addColorStop(0.6, '#cfeffd');
g.addColorStop(1, 'rgba(139, 233, 253, 0)');
x.fillStyle = g;
x.beginPath(); x.arc(CX, CY, 30, 0, Math.PI * 2); x.fill();

// ---- a few drifting motes on / near the orbit (the flock listening) ----
const sparks = [
  [0.30, 392, 5.0, 0.9], [1.45, 406, 3.2, 0.7], [2.62, 380, 4.0, 0.8],
  [3.9, 400, 2.6, 0.6], [4.8, 372, 3.4, 0.75], [5.6, 416, 2.2, 0.55],
];
for (const [a, r, sz, al] of sparks) {
  const px = CX + Math.cos(a) * (r + wob(a)), py = CY + Math.sin(a) * (r + wob(a));
  g = x.createRadialGradient(px, py, 0, px, py, sz * 4);
  g.addColorStop(0, `rgba(220, 250, 255, ${al})`);
  g.addColorStop(0.4, `rgba(139, 233, 253, ${al * 0.5})`);
  g.addColorStop(1, 'rgba(139, 233, 253, 0)');
  x.fillStyle = g;
  x.beginPath(); x.arc(px, py, sz * 4, 0, Math.PI * 2); x.fill();
}

// subtle top-edge sheen so the tile reads as glass, not a void
g = x.createLinearGradient(0, M, 0, M + 340);
g.addColorStop(0, 'rgba(255, 255, 255, 0.06)');
g.addColorStop(1, 'rgba(255, 255, 255, 0)');
x.fillStyle = g;
x.fillRect(M, M, W, 340);

x.restore();

// hairline rim to separate the tile from light backgrounds
tile(x);
x.strokeStyle = 'rgba(139, 233, 253, 0.18)';
x.lineWidth = 2;
x.stroke();

document.title = 'done';
</script>
</body>
</html>
